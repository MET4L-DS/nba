server {
    listen 80;
    server_name 13.233.109.6; # Set to your IP
    root /var/www/html/nba;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle API requests explicitly if needed, or rely on root try_files
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;
    }

    # Pass PHP scripts to FastCGI server
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # Updated to PHP 8.3 based on server inspection
        fastcgi_pass unix:/run/php/php8.3-fpm.sock; 
        
        # Environment Variables for Database
        fastcgi_param DB_HOST localhost;
        fastcgi_param DB_NAME nba_db;
        fastcgi_param DB_USER nba_user;
        fastcgi_param DB_PASS TUnba@420;
    }

    location ~ /\.ht {
        deny all;
    }
}
